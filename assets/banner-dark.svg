  <text x="812" y="86" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace" font-size="10" fill="#6e7681">mcp mesh</text>

  <!-- governance bracket -->
  <path d="M596,100 L596,108 L812,108 L812,100" fill="none" stroke="#d29922" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="704" y="126" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace" font-size="10" fill="#d29922">cascading rbac · full audit trail</text>
